name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions: {}

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: false
      - name: Build
        run: swift build -c release --arch arm64 --arch x86_64 --product chronixd-capture-cli
      - name: Compress
        run: tar -czf chronixd-capture-cli-${GITHUB_REF_NAME}.tar.gz -C .build/apple/Products/Release chronixd-capture-cli
      - name: Release
        run: gh release create ${GITHUB_REF_NAME} chronixd-capture-cli-${GITHUB_REF_NAME}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
